name: Build Android Debug APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Prepare APK file
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/ChloeVibes-latest-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChloeVibes-latest-debug-apk
          path: dist/ChloeVibes-latest-debug.apk
          if-no-files-found: error

      - name: Publish release asset
        uses: ncipollo/release-action@v1
        with:
          tag: android-latest
          name: ChloeVibes Android Latest
          body: Latest Android debug APK built from master.
          artifacts: dist/ChloeVibes-latest-debug.apk
          artifactErrorsFailBuild: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          # Keep the comprehensive "latest" (Windows + Android) release as the
          # GitHub "Latest" — this rolling APK-only release must not claim it.
          makeLatest: false
