name: Build Android Debug APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Patch BLE scan behavior for unnamed devices
        shell: python
        run: |
          from pathlib import Path

          path = Path('android/app/src/main/kotlin/com/ashairfoil/chloevibes/device/BleDeviceManager.kt')
          text = path.read_text()

          old = '''            val device = result.device
            // Device name can be null in early advertisements — try scanRecord
            // first (more reliable), then fall back to device.name, then skip
            // only if both are null AND we haven't seen this address before.
            val name = result.scanRecord?.deviceName
                ?: device.name
                ?: discoveredDevices[device.address]?.name
                ?: return
            val isLovense = name.startsWith("LVS-") || name.contains("Lovense", ignoreCase = true)

            val info = BleDeviceInfo(
'''

          new = '''            val device = result.device
            // Some Lovense models advertise without a local name in early or
            // filtered scan packets. Keep them visible instead of silently
            // discarding them so Hush 2 can still be selected and connected.
            val advertisedName = result.scanRecord?.deviceName
                ?: device.name
                ?: discoveredDevices[device.address]?.name
            val name = advertisedName ?: "Unknown BLE ${device.address.takeLast(5)}"
            val isLovense = name.startsWith("LVS-") || name.contains("Lovense", ignoreCase = true)

            Log.d(
                "ChloeVibes",
                "BLE seen: name=$advertisedName, address=${device.address}, rssi=${result.rssi}, uuids=${result.scanRecord?.serviceUuids}"
            )

            val info = BleDeviceInfo(
'''

          if old not in text:
              raise SystemExit('Expected BLE scan block not found. Source changed; refusing to build unpatched APK.')

          path.write_text(text.replace(old, new))

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChloeVibes-debug-apk-hush2-scan-fix
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
