name: Build Android Debug APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Patch BLE scan behavior for unnamed devices
        shell: python
        run: |
          from pathlib import Path

          path = Path('android/app/src/main/kotlin/com/ashairfoil/chloevibes/device/BleDeviceManager.kt')
          text = path.read_text()

          old = '''            val device = result.device
            // Device name can be null in early advertisements — try scanRecord
            // first (more reliable), then fall back to device.name, then skip
            // only if both are null AND we haven't seen this address before.
            val name = result.scanRecord?.deviceName
                ?: device.name
                ?: discoveredDevices[device.address]?.name
                ?: return
            val isLovense = name.startsWith("LVS-") || name.contains("Lovense", ignoreCase = true)

            val info = BleDeviceInfo(
'''

          new = '''            val device = result.device
            val advertisedName = result.scanRecord?.deviceName
                ?: device.name
                ?: discoveredDevices[device.address]?.name
            val name = advertisedName ?: "Unknown BLE ${device.address.takeLast(5)}"
            val isLovense = name.startsWith("LVS-") || name.contains("Lovense", ignoreCase = true)

            Log.d(
                "ChloeVibes",
                "BLE seen: name=$advertisedName, address=${device.address}, rssi=${result.rssi}, uuids=${result.scanRecord?.serviceUuids}"
            )

            val info = BleDeviceInfo(
'''

          if old not in text:
              raise SystemExit('Expected BLE scan block not found')

          path.write_text(text.replace(old, new))

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Prepare APK file
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/ChloeVibes-latest-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChloeVibes-latest-debug-apk
          path: dist/ChloeVibes-latest-debug.apk
          if-no-files-found: error

      - name: Publish release asset
        uses: ncipollo/release-action@v1
        with:
          tag: android-latest
          name: ChloeVibes Android Latest
          body: Latest Android debug APK built from master.
          artifacts: dist/ChloeVibes-latest-debug.apk
          artifactErrorsFailBuild: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true
