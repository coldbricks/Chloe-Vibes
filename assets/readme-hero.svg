<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ChloeVibes audio-reactive haptic engine</title>
  <desc id="desc">A dark neon product banner for ChloeVibes with audio waveforms, haptic pulses, and Memphis-inspired accent graphics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09070f"/>
      <stop offset="0.45" stop-color="#171022"/>
      <stop offset="1" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2ea6"/>
      <stop offset="0.35" stop-color="#ff7a00"/>
      <stop offset="0.67" stop-color="#fff240"/>
      <stop offset="1" stop-color="#23f6ff"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2ea6"/>
      <stop offset="0.48" stop-color="#23f6ff"/>
      <stop offset="1" stop-color="#72ff00"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-30%" width="140%" height="170%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="halftone" width="22" height="22" patternUnits="userSpaceOnUse">
      <rect width="22" height="22" fill="none"/>
      <circle cx="5" cy="5" r="2.7" fill="#23f6ff" opacity="0.75"/>
      <circle cx="16" cy="15" r="2.2" fill="#ff2ea6" opacity="0.65"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="372" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>

  <g opacity="0.9">
    <rect x="860" y="34" width="270" height="146" rx="26" fill="url(#halftone)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <path d="M65 81 L99 58 L134 81 L169 58 L204 81" fill="none" stroke="#fff240" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M962 266 L996 236 L1031 266 L1066 236 L1101 266" fill="none" stroke="#ff2ea6" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="101" cy="301" r="54" fill="none" stroke="#23f6ff" stroke-width="12"/>
    <circle cx="104" cy="301" r="22" fill="#ff2ea6"/>
    <path d="M1012 85 L1044 105 L1080 90 L1069 130 L1100 157 L1059 160 L1044 199 L1028 160 L987 157 L1018 130 Z" fill="#72ff00" stroke="#09070f" stroke-width="8"/>
  </g>

  <g transform="translate(82 92)">
    <text x="0" y="0" font-family="Arial Black, Impact, system-ui, sans-serif" font-size="92" font-weight="900" fill="url(#logo)" filter="url(#glow)">ChloeVibes</text>
    <text x="3" y="0" font-family="Arial Black, Impact, system-ui, sans-serif" font-size="92" font-weight="900" fill="none" stroke="#ffffff" stroke-opacity="0.74" stroke-width="2">ChloeVibes</text>
    <text x="4" y="51" font-family="Arial, system-ui, sans-serif" font-size="25" font-weight="700" fill="#f8f7ff" letter-spacing="3">AUDIO-REACTIVE HAPTIC ENGINE</text>
  </g>

  <g transform="translate(82 198)" font-family="Arial Black, Impact, system-ui, sans-serif" font-weight="900">
    <rect x="0" y="0" width="194" height="46" rx="23" fill="#ff2ea6"/>
    <rect x="210" y="0" width="182" height="46" rx="23" fill="#23f6ff"/>
    <rect x="408" y="0" width="170" height="46" rx="23" fill="#fff240"/>
    <rect x="594" y="0" width="204" height="46" rx="23" fill="#72ff00"/>
    <text x="97" y="31" text-anchor="middle" font-size="19" fill="#09070f">BASS LOCK</text>
    <text x="301" y="31" text-anchor="middle" font-size="19" fill="#09070f">ADSR PULSE</text>
    <text x="493" y="31" text-anchor="middle" font-size="19" fill="#09070f">BLE DRIVE</text>
    <text x="696" y="31" text-anchor="middle" font-size="19" fill="#09070f">DUAL MOTOR</text>
  </g>

  <g transform="translate(82 296)" filter="url(#glow)">
    <path d="M0 35 C52 35 52 0 104 0 C156 0 156 70 208 70 C260 70 260 16 312 16 C364 16 364 54 416 54 C468 54 468 8 520 8 C572 8 572 64 624 64 C676 64 676 30 728 30 C780 30 780 45 832 45 C884 45 884 14 936 14 C988 14 988 60 1040 60" fill="none" stroke="url(#wave)" stroke-width="12" stroke-linecap="round"/>
    <path d="M0 35 C52 35 52 0 104 0 C156 0 156 70 208 70 C260 70 260 16 312 16 C364 16 364 54 416 54 C468 54 468 8 520 8 C572 8 572 64 624 64 C676 64 676 30 728 30 C780 30 780 45 832 45 C884 45 884 14 936 14 C988 14 988 60 1040 60" fill="none" stroke="#ffffff" stroke-opacity="0.24" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
