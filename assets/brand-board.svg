<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">ChloeVibes visual identity board</title>
  <desc id="desc">A neon Memphis revival brand board with color swatches, rhythm labels, sticker shapes, and haptic device keywords.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ff"/>
      <stop offset="0.24" stop-color="#c6fff8"/>
      <stop offset="0.50" stop-color="#fff240"/>
      <stop offset="0.75" stop-color="#ffaadf"/>
      <stop offset="1" stop-color="#9b61ff"/>
    </linearGradient>
    <pattern id="checker" width="42" height="42" patternUnits="userSpaceOnUse">
      <rect width="42" height="42" fill="#ffffff"/>
      <rect width="21" height="21" fill="#1b1724"/>
      <rect x="21" y="21" width="21" height="21" fill="#1b1724"/>
    </pattern>
    <pattern id="sprinkles" width="90" height="90" patternUnits="userSpaceOnUse">
      <rect width="90" height="90" fill="#20f6ff"/>
      <rect x="12" y="12" width="32" height="8" rx="4" fill="#ff2ea6" transform="rotate(-18 28 16)"/>
      <rect x="55" y="22" width="28" height="8" rx="4" fill="#fff240" transform="rotate(24 69 26)"/>
      <rect x="18" y="62" width="36" height="8" rx="4" fill="#72ff00" transform="rotate(15 36 66)"/>
      <circle cx="70" cy="70" r="6" fill="#ff6a00"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="6" dy="7" stdDeviation="0" flood-color="#1b1724" flood-opacity="1"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="#1b1724"/>
  <rect x="20" y="20" width="1160" height="320" rx="24" fill="url(#bg)"/>

  <g opacity="0.95">
    <path d="M31 59 C79 23 136 95 188 56 C230 25 270 62 312 43" fill="none" stroke="#1b1724" stroke-width="10" stroke-linecap="round"/>
    <path d="M879 61 L914 35 L949 61 L985 35 L1020 61 L1056 35 L1091 61" fill="none" stroke="#1b1724" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="35" y="202" width="160" height="94" rx="18" fill="url(#checker)" stroke="#1b1724" stroke-width="7"/>
    <rect x="1006" y="191" width="142" height="104" rx="20" fill="url(#sprinkles)" stroke="#1b1724" stroke-width="7"/>
    <path d="M970 106 L995 124 L1025 111 L1017 144 L1042 165 L1008 168 L995 199 L982 168 L948 165 L973 144 Z" fill="#fff240" stroke="#1b1724" stroke-width="7"/>
    <path d="M219 82 L246 102 L280 89 L269 126 L300 150 L260 151 L246 187 L232 151 L192 150 L223 126 Z" fill="#72ff00" stroke="#1b1724" stroke-width="7"/>
  </g>

  <g font-family="Arial Black, Impact, system-ui, sans-serif" font-weight="900" filter="url(#shadow)">
    <text x="73" y="130" font-size="58" fill="#ff2ea6" stroke="#ffffff" stroke-width="8" paint-order="stroke">VISUAL SYSTEM</text>
    <text x="77" y="176" font-size="30" fill="#1b1724">NEON MEMPHIS / STICKER BOMB / BASS-HOUSE HEAT</text>
  </g>

  <g transform="translate(376 66)" font-family="Arial Black, Impact, system-ui, sans-serif" font-weight="900">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="134" height="100" rx="18" fill="#ff2ea6" stroke="#1b1724" stroke-width="6"/>
      <rect x="150" y="0" width="134" height="100" rx="18" fill="#20f6ff" stroke="#1b1724" stroke-width="6"/>
      <rect x="300" y="0" width="134" height="100" rx="18" fill="#fff240" stroke="#1b1724" stroke-width="6"/>
      <rect x="450" y="0" width="134" height="100" rx="18" fill="#72ff00" stroke="#1b1724" stroke-width="6"/>
      <rect x="600" y="0" width="134" height="100" rx="18" fill="#ff6a00" stroke="#1b1724" stroke-width="6"/>
    </g>
    <g font-size="18" fill="#1b1724" text-anchor="middle">
      <text x="67" y="130">HOT PINK</text>
      <text x="217" y="130">CYAN POP</text>
      <text x="367" y="130">ACID YELLOW</text>
      <text x="517" y="130">LIME HIT</text>
      <text x="667" y="130">DROP ORANGE</text>
    </g>
  </g>

  <g transform="translate(250 236)" font-family="Arial Black, Impact, system-ui, sans-serif" font-weight="900" text-anchor="middle">
    <g filter="url(#shadow)">
      <path d="M-91 -35 L91 -35 L111 0 L91 35 L-91 35 L-111 0 Z" fill="#20f6ff" stroke="#1b1724" stroke-width="6"/>
      <text y="10" font-size="23" fill="#1b1724">OFF-BEAT HATS</text>
    </g>
  </g>
  <g transform="translate(508 236)" font-family="Arial Black, Impact, system-ui, sans-serif" font-weight="900" text-anchor="middle">
    <g filter="url(#shadow)">
      <path d="M-85 -39 L-44 -56 L-20 -36 L27 -54 L57 -31 L91 -39 L105 1 L83 38 L24 32 L-15 55 L-47 34 L-99 41 L-108 0 Z" fill="#ff2ea6" stroke="#1b1724" stroke-width="6"/>
      <text y="9" font-size="23" fill="#ffffff">THROB BASS</text>
    </g>
  </g>
  <g transform="translate(766 236)" font-family="Arial Black, Impact, system-ui, sans-serif" font-weight="900" text-anchor="middle">
    <g filter="url(#shadow)">
      <rect x="-118" y="-35" width="236" height="70" rx="18" fill="#fff240" stroke="#1b1724" stroke-width="6"/>
      <text y="10" font-size="23" fill="#1b1724">DOMI 2 / LUSH</text>
    </g>
  </g>
  <g transform="translate(995 236)" font-family="Arial Black, Impact, system-ui, sans-serif" font-weight="900" text-anchor="middle">
    <g filter="url(#shadow)">
      <path d="M-93 -35 L93 -35 L93 35 L-93 35 Z" fill="#72ff00" stroke="#1b1724" stroke-width="6"/>
      <text y="10" font-size="23" fill="#1b1724">NOISE GATE</text>
    </g>
  </g>

  <g fill="none" stroke="#1b1724" stroke-width="8" stroke-linecap="round">
    <path d="M112 310 L142 289 L174 310 L205 289"/>
    <path d="M837 310 C882 275 927 342 973 309"/>
  </g>
</svg>
